<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Make No Mistakes  Agent Harness Research Ebook">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="320" rx="24" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
  <text x="80" y="140" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="22" letter-spacing="6">OPEN RESEARCH EBOOK</text>
  <text x="80" y="220" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="64" font-weight="700">MAKE NO MISTAKES</text>
  <text x="80" y="280" fill="url(#accent)" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">Model-Agnostic Agent Harness Architecture</text>
  <text x="80" y="330" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="20">217 claims · 30 sources · 12 codebases · June 2026</text>
  <circle cx="1040" cy="200" r="72" fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  <text x="1040" y="212" text-anchor="middle" fill="#58a6ff" font-family="Consolas, monospace" font-size="42" font-weight="700">5</text>
  <text x="1040" y="242" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="14">TIER STACK</text>
</svg>
